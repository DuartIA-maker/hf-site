<!DOCTYPE html>
<html>
<head>
  <title>HF Odds Engine</title>
</head>
<body style="background:black;color:white;font-family:sans-serif">
  <h1>HF Odds Engine 🔥</h1>
  <button onclick="carregar()">Buscar Apostas</button>

  <div id="resultado"></div>

  <script>
    async function carregar() {
      const res = await fetch("https://hf-ia-production.up.railway.app/value-bets");
      const data = await res.json();

      let html = "";

      data.forEach(b => {
        html += `
          <div style="margin-top:20px">
            <h3>${b.jogo}</h3>
            <p>${b.aposta}</p>
            <p>Odd: ${b.odd}</p>
            <p style="color:lime">EV: ${b.ev}</p>
          </div>
        `;
      });

      document.getElementById("resultado").innerHTML = html;
    }
  </script>
</body>
</html>
