<script>
  let isPro = false; // 👈 AQUI

  let historico = [];

  async function carregar() {
    const res = await fetch("https://hf-ia-production.up.railway.app/value-bets");
    const data = await res.json();

    const lista = isPro ? data : data.slice(0,2); // 👈 AQUI

    let html = "";

    lista.forEach(b => {
      html += `
        <div style="margin:20px;padding:15px;background:#111;border-radius:10px">
          <h3>${b.jogo}</h3>
          <p>Probabilidade: ${b.prob}</p>
          <p>Odd: ${b.odd}</p>
          <p style="color:${b.ev > 0 ? 'lime' : 'red'}">EV: ${b.ev}</p>
          <button onclick="salvar('${b.jogo}')">Salvar</button>
        </div>
      `;
    });

    document.getElementById("resultado").innerHTML = html;
  }

  function salvar(jogo){
    historico.push(jogo);
    document.getElementById("historico").innerHTML += `<p>${jogo}</p>`;
  }

  function login(){
    isPro = true;
    alert("Modo PRO ativado 🔥");
  }
</script>
<button onclick="login()">Entrar</button>
<button onclick="login()">Entrar</button>
